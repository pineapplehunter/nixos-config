name: CI

# update note:
# The hash of the actions used can be updated with actions-up
# $ nix shell .#bun -c bunx actions-up

on:
  push:
  pull_request:

  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        system:
          - "aarch64-darwin"
          - "aarch64-linux"
          - "x86_64-linux"
    runs-on: >-
      ${{ (matrix.system == 'x86_64-linux' && 'ubuntu-latest')
      || (matrix.system == 'aarch64-linux' && 'ubuntu-24.04-arm')
      || (matrix.system == 'aarch64-darwin' && 'macos-latest') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: enable unprivileged userns clone
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo sysctl -w kernel.unprivileged_userns_clone=1
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
        if: runner.os == 'Linux'
      - uses: cachix/install-nix-action@96951a368ba55167b55f1c916f7d416bac6505fe # v31.10.3
        with:
          extra_nix_config: |
            fallback = true
            accept-flake-config = true
            system = ${{ matrix.system }}
            extra-substituters = https://attic.s.ihavenojob.work/shogo
            extra-trusted-public-keys = shogo:R9ZWo9iGw8E0X6G24R7XLPH0UeE3VZ/WFi2+D0Kmud4=

      - name: Run checks
        run: nix build ".#ci"

      - name: Upload Cache
        if: always()
        continue-on-error: true
        run: |
          nix profile add --inputs-from . "nixpkgs#attic-client"
          attic login attic-server ${{ vars.ATTIC_ENDPOINT }} ${{ secrets.ATTIC_TOKEN }}
          attic use ${{ vars.ATTIC_CACHE }}
          nix path-info --all | grep -v ".drv$" | attic push ${{ vars.ATTIC_CACHE }} --stdin
