name: CI

# update note:
# The hash of the actions used can be updated with actions-up
# $ nix shell .#bun -c bunx actions-up

on:
  push:
  pull_request:

  workflow_dispatch:

permissions:
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        system:
          - "aarch64-darwin"
          - "aarch64-linux"
          - "x86_64-linux"
    runs-on: >-
      ${{ (matrix.system == 'x86_64-linux' && 'ubuntu-26.04')
      || (matrix.system == 'aarch64-linux' && 'ubuntu-26.04-arm')
      || (matrix.system == 'aarch64-darwin' && 'macos-latest') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: enable unprivileged userns clone
        if: runner.os == 'Linux'
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          sudo sysctl -w kernel.unprivileged_userns_clone=1
      - uses: wimpysworld/nothing-but-nix@687c797a730352432950c707ab493fcc951818d7 # v10
        if: runner.os == 'Linux'
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          extra_nix_config: |
            fallback = true
            accept-flake-config = true
            system = ${{ matrix.system }}
            extra-substituters = https://niks3.gweb.ihavenojob.work?priority=80
            extra-trusted-public-keys = niks3-cache:RW+9UW/AgeDvEawJndPbzNVYQcDPjXA4J23srAi5+sE=

      - uses: Mic92/niks3-action@12d3e320b2a99b7938f9634bd337cd9fec104609 # v1.1.0
        with:
          server-url: https://niks3.s.ihavenojob.work

      - name: Run checks
        run: nix build ".#ci"

