[[language]]
language-servers = ["nixd", "nil", "helix-assist"]
name = "nix"

[[language]]
name = "markdown"

[language.soft-wrap]
enable = true

[[language]]
name = "latex"

[language.soft-wrap]
enable = true

[[language]]
name = "typst"

[language.soft-wrap]
enable = true

[[language]]
language-servers = ["ruff", "basedpyright", "helix-assist"]
name = "python"

[[language]]
name = "meson"

[[language]]
name = "rust"
language-servers = ["rust-analyzer", "helix-assist"]

[language.formatter]
args = ["fmt", "-"]
command = "meson"

[language-server.basedpyright]
args = ["--stdio"]
command = "basedpyright-langserver"

[language-server.basedpyright.config.pyright]
disableTaggedHints = true

[language-server.nixd]
command = "nixd"

[language-server.ruff]
args = ["server", "-q", "--preview"]
command = "ruff"

[language-server.helix-assist]
command = "helix-assist"
args = ["--handler", "anthropic", "--num-suggestions", "2"]
